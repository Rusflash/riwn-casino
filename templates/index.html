<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RuWin Casino</title>
    <style>
        body { font-family: Arial; background: #0a0a0f; color: #fff; padding: 20px; }
        .header { display: flex; justify-content: space-between; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; }
        .balance { color: #00ff88; font-size: 24px; font-weight: bold; }
        .spin-btn { padding: 15px 30px; background: linear-gradient(45deg, #00f0ff, #8b00ff); border: none; border-radius: 12px; color: #fff; font-size: 20px; cursor: pointer; }
        .slots { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin: 20px 0; }
        .slot { background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; text-align: center; font-size: 48px; }
        .slot div { padding: 10px; }
        .game-input { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.15); border-radius: 10px; color: #fff; font-size: 16px; width: 100%; }
    </style>
</head>
<body>
    <div class="header">
        <div><h1>🎰 RuWin</h1></div>
        <div><span class="balance">💰 $<span id="balance">10000</span></span></div>
    </div>

    <h2>🎲 СЛОТЫ</h2>
    <div class="slots" id="slots">
        <div class="slot"><div>🎰</div><div>🎰</div><div>🎰</div></div>
        <div class="slot"><div>🎰</div><div>🎰</div><div>🎰</div></div>
        <div class="slot"><div>🎰</div><div>🎰</div><div>🎰</div></div>
    </div>

    <input type="number" id="bet" class="game-input" value="10" min="1">
    <button class="spin-btn" id="spinBtn">🎰 КРУТИТЬ</button>
    <div id="result" style="margin-top:20px;text-align:center;font-size:20px;"></div>

    <script>
        let sessionId = null;

        async function init() {
            const response = await fetch('/api/init', { method: 'POST' });
            const data = await response.json();
            sessionId = data.session_id;
            document.getElementById('balance').textContent = data.stats.balance;
        }

        document.getElementById('spinBtn').addEventListener('click', async function() {
            const amount = parseFloat(document.getElementById('bet').value);
            const response = await fetch('/api/slots/spin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, amount: amount })
            });
            const data = await response.json();
            
            if (data.success) {
                const slots = document.querySelectorAll('.slot');
                data.reels.forEach((symbol, i) => {
                    const row = Math.floor(i / 3);
                    const col = i % 3;
                    slots[col].children[row].textContent = symbol;
                });
                
                const result = document.getElementById('result');
                result.className = data.win ? 'win' : 'loss';
                result.textContent = data.win ? `🎉 ВЫИГРЫШ +$${data.win_amount}` : `😞 ПРОИГРЫШ $${Math.abs(data.win_amount)}`;
                document.getElementById('balance').textContent = data.balance;
            }
        });

        init();
    </script>
</body>
</html>
