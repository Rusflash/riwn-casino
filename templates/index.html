<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RuWin Casino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: rgba(10,10,15,0.95);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 28px; color: #00f0ff; font-weight: bold; }
        .balance { color: #00ff88; font-size: 24px; font-weight: bold; }
        .spin-btn {
            padding: 15px 30px;
            background: linear-gradient(45deg, #00f0ff, #8b00ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            width: 100%;
        }
        .spin-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .slots { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; margin: 20px 0; }
        .slot {
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid rgba(0,240,255,0.1);
        }
        .slot div {
            font-size: 48px;
            padding: 10px;
        }
        .slot div.win-highlight {
            background: rgba(0,255,136,0.2);
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
            border-radius: 10px;
        }
        .game-input {
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            width: 100%;
            margin: 10px 0;
        }
        .game-result {
            text-align: center;
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
        }
        .game-result.win { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; }
        .game-result.loss { background: rgba(255,0,64,0.1); border: 1px solid #ff0040; color: #ff0040; }
        .game-wrapper {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,240,255,0.15);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
        }
        .game-title { text-align: center; font-size: 28px; color: #00f0ff; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🎰 RuWin</div>
        <div>
            <span class="balance">💰 $<span id="balance">10000</span></span>
        </div>
    </div>

    <div class="game-wrapper">
        <h2 class="game-title">🎲 СЛОТЫ</h2>
        <div class="slots" id="slots">
            <div class="slot"><div>🎰</div><div>🎰</div><div>🎰</div></div>
            <div class="slot"><div>🎰</div><div>🎰</div><div>🎰</div></div>
            <div class="slot"><div>🎰</div><div>🎰</div><div>🎰</div></div>
        </div>

        <div class="game-result" id="result">Сделайте ставку!</div>

        <input type="number" id="bet" class="game-input" value="10" min="1">
        <button class="spin-btn" id="spinBtn">🎰 КРУТИТЬ</button>
    </div>

    <script>
        let sessionId = null;

        async function init() {
            try {
                const response = await fetch('/api/init', { method: 'POST' });
                const data = await response.json();
                sessionId = data.session_id;
                document.getElementById('balance').textContent = data.stats.balance;
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('result').textContent = '❌ Ошибка подключения к серверу!';
            }
        }

        document.getElementById('spinBtn').addEventListener('click', async function() {
            const amount = parseFloat(document.getElementById('bet').value);
            if (isNaN(amount) || amount <= 0) {
                document.getElementById('result').textContent = '❌ Введите сумму!';
                return;
            }

            this.disabled = true;
            document.getElementById('result').textContent = '⏳ Крутим...';

            try {
                const response = await fetch('/api/slots/spin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, amount: amount })
                });
                const data = await response.json();

                if (data.success) {
                    const slots = document.querySelectorAll('.slot');
                    data.reels.forEach((symbol, i) => {
                        const row = Math.floor(i / 3);
                        const col = i % 3;
                        const child = slots[col].children[row];
                        child.textContent = symbol;
                        child.classList.remove('win-highlight');
                    });

                    const result = document.getElementById('result');
                    if (data.win) {
                        result.className = 'game-result win';
                        result.textContent = `🎉 ВЫИГРЫШ +$${data.win_amount}`;
                        // Подсветка всех символов при выигрыше
                        document.querySelectorAll('.slot div').forEach(el => {
                            if (el.textContent !== '🎰') {
                                el.classList.add('win-highlight');
                            }
                        });
                    } else {
                        result.className = 'game-result loss';
                        result.textContent = `😞 ПРОИГРЫШ $${Math.abs(data.win_amount)}`;
                    }
                    document.getElementById('balance').textContent = data.balance;
                } else {
                    document.getElementById('result').textContent = `❌ ${data.error}`;
                }
            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('result').textContent = '❌ Ошибка сервера!';
            }

            this.disabled = false;
        });

        init();
    </script>
</body>
</html>
