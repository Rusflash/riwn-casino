<!DOCTYPE html>
<html>
<head>
    <title>RuWin - Проверка</title>
</head>
<body>
    <h1>🎰 RuWin Casino</h1>
    <p>Если вы это видите, значит index.html загружается!</p>
    <p>Текущий баланс: <span id="balance">10000</span></p>
    <button onclick="checkAPI()">Проверить API</button>
    <script>
        async function checkAPI() {
            try {
                const response = await fetch('/api/init', { method: 'POST' });
                const data = await response.json();
                document.getElementById('balance').textContent = data.stats.balance;
                alert('API работает! Баланс: ' + data.stats.balance);
            } catch (error) {
                alert('Ошибка API: ' + error);
            }
        }
    </script>
</body>
</html>
